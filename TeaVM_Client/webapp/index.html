<!DOCTYPE html>
<html>
  <head>
    <title>Runescape by Andrew Gower</title>
    <meta charset="utf-8">
    <style>body{margin:0;background-color: black;}</style>
  </head>
  <body>
    <script>
      // Resolve the client's runtime config here. The TeaVM client reads these window.OPENRSC fields
      // and does NOT parse the URL itself, so this snippet is the single place a deployment configures
      // it: each field comes from the page URL, falling back to the default beside it.
      window.OPENRSC = (function () {
        var q = new URLSearchParams(location.search);
        return {
          // Game-server WebSocket. Edit the default to host against a different OpenRSC server;
          // ?server=host:port (or a full ws(s):// URL) overrides per visit.
          server: q.get('server') || 'wss://game.openrsc.com:43435/',
          // Optional auto-login; leave empty to show the normal login screen. ?user=&pass= overrides.
          user: q.get('user') || '',
          pass: q.get('pass') || '',
          // Base URL for the baked cache/ + pack/ assets (relative to this page when empty).
          assets: q.get('assets') || ''
        };
      })();
    </script>
    <script type="text/javascript" charset="utf-8" src="teavm/classes.js"></script>
    <script>main();</script>
  </body>
</html>
